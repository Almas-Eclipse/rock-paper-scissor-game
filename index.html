<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="./styles/style.css">
</head>
<body>

  <!-- HOME SCREEN -->
  <div id="home-screen">
    <h1>Rock Paper Scissors 🎮</h1>
    <input type="text" id="player-name" placeholder="Name Loading… 99%">
    <button id="start-btn">Start Game</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" style="display: none;">
    <h2 id="welcome-message"></h2>
    <p>Score: <span id="score">0</span></p>
    <p>High Score: <span id="high-score">0</span></p>

    <button class="choice" data-choice="rock">🪨 Rock</button>
    <button class="choice" data-choice="paper">📄 Paper</button>
    <button class="choice" data-choice="scissors">✂️ Scissors</button>
<div id="choices-display">
  <div>
    <p>You</p>
    <img id="player-img" src="" alt="your choice">
  </div>
  <div>
    <p>Computer</p>
    <img id="computer-img" src="" alt="computer choice">
  </div>
</div>
    <p id="result"></p>
  </div>

  <!-- END SCREEN -->
  <div id="end-screen" style="display: none;">
    <h2>Game Over 🎉</h2>
    <p id="final-message"></p>
    <button id="restart-btn">Play Again</button>
  </div>

  <script src="./js/index.js"></script>
</body>
</html>
